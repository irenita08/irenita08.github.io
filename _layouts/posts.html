---
layout: default
---
<article class="post h-entry" itemscope itemtype="http://schema.org/BlogPosting">

  <header class="post-header">
    <h1 class="post-title p-name" itemprop="name headline">{{ page.title | escape }}</h1>
    <p class="post-meta">
      <time class="dt-published" datetime="{{ page.date | xmlschema }}" itemprop="datePublished">
        {{ page.date | date: "%b %-d, %Y" }}
      </time>
    </p>
  </header>

  <div class="post-content e-content" itemprop="articleBody">
    {{ content }}
  </div>

</article>

<style>
  /* This ensures the images break out of the Minima container specifically */
  .post-content img {
    width: 100vw !important;
    max-width: 100vw !important;
    height: auto !important;
    margin-left: calc(50% - 50vw) !important;
    margin-right: calc(50% - 50vw) !important;
    display: block;
    margin-top: 2rem;
    margin-bottom: 2rem;
  }
  
  /* This keeps your beautiful writing from stretching too wide */
  .post-content p, .post-content blockquote, .post-content ul, .post-content h2 {
    max-width: 700px;
    margin-left: auto;
    margin-right: auto;
    padding: 0 15px;
    line-height: 1.6;
  }
</style>
